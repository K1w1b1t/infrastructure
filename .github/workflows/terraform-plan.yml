name: Terraform Plan

on:
  pull_request:
    branches: [ main ]

jobs:
  sonarqube:
    name: SonarQube Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Importante setar 0 para o Sonar ler todo o histórico do PR e arquivos novos

      - name: SonarQube Scan & Gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 
          export SONAR_SCANNER_VERSION=8.0.1.6346
          export SONAR_SCANNER_HOME=$HOME/.sonar/sonar-scanner-$SONAR_SCANNER_VERSION-linux-x64
          curl --create-dirs -sSLo $HOME/.sonar/sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-$SONAR_SCANNER_VERSION-linux-x64.zip
          unzip -o $HOME/.sonar/sonar-scanner.zip -d $HOME/.sonar/
          export PATH=$SONAR_SCANNER_HOME/bin:$PATH

          # A flag -Dsonar.qualitygate.wait=true trava a execução até o servidor devolver o resultado do Gate
          sonar-scanner \
            -Dsonar.organization=k1w1b1t \
            -Dsonar.projectKey=K1w1b1t_infrastructure \
            -Dsonar.qualitygate.wait=true

  terraform:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: sonarqube # Só roda se o job do SonarQube passar!
    env:
      TFSTATE_BUCKET: ${{ secrets.TFSTATE_BUCKET }}
      TF_NAMESPACE: ${{ secrets.TF_NAMESPACE }}
      TF_VAR_compartment_ocid: ${{ secrets.OCI_TENANCY_OCID }} # Aqui assumimos que é na tenancy (root container)
      TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7

      - name: Configure OCI credentials
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          key_file=/home/runner/.oci/oci_api_key.pem
          EOF

      - name: Terraform Init
          terraform init -backend-config="bucket=${TFSTATE_BUCKET}" -backend-config="namespace=${TF_NAMESPACE}" -reconfigure

      - name: Terraform Plan
          terraform plan -out=tfplan
          terraform show -no-color tfplan > plan.txt

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: plan.txt
